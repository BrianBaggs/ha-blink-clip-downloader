---
name: CI/CD Pipeline

'on':
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  ADDON_IMAGE: ghcr.io/${{ github.repository_owner }}/test-blink-clip-downloader
  TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "blink_clip_downloader[test]"
          pip install pyright yamllint ruff

      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: blink_clip_downloader
          community: false

      - name: Run YAML lint
        run: yamllint .

      - name: Run Ruff
        run: ruff check blink_clip_downloader

      - name: Check formatting with Ruff
        run: ruff format --check blink_clip_downloader

      - name: Run Pyright
        run: pyright --project pyrightconfig.json

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install project with test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "blink_clip_downloader[test]"

      - name: Run pytest with coverage
        run: |
          pytest blink_clip_downloader/tests \
            -v \
            --tb=short \
            --cov=blink_downloader \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build Add-on Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build add-on image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: amd64
          image: ${{ env.ADDON_IMAGE }}
          image-tags: |
            ${{ env.TAG }}
          push: "false"
          cosign: "false"
          version: ${{ env.TAG }}
          context: blink_clip_downloader
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/base-python:3.12

      - name: Save built Docker image
        run: docker save ${{ env.ADDON_IMAGE }}:${{ env.TAG }} -o addon-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-image
          path: addon-image.tar

  smoke-test:
    name: Smoke Test Add-on Container
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built image artifact
        uses: actions/download-artifact@v4
        with:
          name: addon-image

      - name: Load Docker image
        run: docker load -i addon-image.tar

      - name: Create smoke-test data directories
        run: |
          mkdir -p smoke-test/data smoke-test/share
          cat > smoke-test/data/options.json <<'EOF'
          {
            "username": "test@example.com",
            "password": "test-password",
            "download_path": "/share/blink-clips",
            "poll_interval": 300,
            "max_clips_per_poll": 1,
            "retention_days": 1,
            "max_storage_gb": 1.0,
            "camera_filter": [],
            "download_thumbnails": false,
            "concurrent_downloads": 1,
            "retry_attempts": 1,
            "retry_delay": 1.0,
            "notify_ha": false,
            "create_clip_manifest": false,
            "enable_library_db": true,
            "enable_media_server": false,
            "watch_ha_events": false,
            "fast_poll_duration": 120,
            "fast_poll_interval": 15,
            "post_motion_delay": 30,
            "event_cameras": [],
            "digest_enabled": false,
            "archive_enabled": false,
            "log_level": "info"
          }
          EOF

      - name: Run container
        run: |
          docker run -d --name addon \
            -e TZ=UTC \
            -v "${{ github.workspace }}/smoke-test/data:/data" \
            -v "${{ github.workspace }}/smoke-test/share:/share" \
            ${{ env.ADDON_IMAGE }}:${{ env.TAG }}

      - name: Wait for startup
        run: sleep 15

      - name: Validate container health
        run: |
          if ! docker ps \
            --filter "name=addon" \
            --filter "status=running" \
            | grep addon; then
            docker logs addon
            exit 1
          fi

          docker logs addon

      - name: Cleanup
        if: always()
        run: docker rm -f addon || true
