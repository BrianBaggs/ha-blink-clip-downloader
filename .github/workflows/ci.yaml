name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint pyright yamllint ruff

      - name: Run Home Assistant addon linter
        uses: frenck/action-addon-linter@v2
        with:
          path: './'

      - name: Run YAML lint
        run: yamllint .

      - name: Install project (editable)
        run: |
          pip install -e "blink_clip_downloader"

      - name: Run Ruff (modern Python lint)
        run: ruff check blink_clip_downloader

      - name: Run Pylint
        run: pylint blink_clip_downloader/blink_downloader

      - name: Run Pyright (type check)
        run: pyright

  test:
    name: Tests (Python 3.12)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install project with test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "blink_clip_downloader[test]"

      - name: Run pytest
        run: pytest blink_clip_downloader/tests -v --tb=short

  build:
    name: Build Add-on (HA Builder)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build add-on (Supervisor test mode)
        uses: home-assistant/builder@master
        with:
          args: >-
            --test
            --all
            --target /data

  smoke-test:
    name: Smoke Test Add-on Container
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t test-addon blink_clip_downloader

      - name: Run container
        run: |
          docker run -d --name addon \
            -e TZ=UTC \
            test-addon

      - name: Wait for startup
        run: sleep 15

      - name: Check container is running
        run: |
          docker ps | grep addon

      - name: Show logs (on failure)
        if: failure()
        run: docker logs addon