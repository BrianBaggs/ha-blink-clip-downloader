---
name: CI/CD Pipeline

'on': [pull_request]

jobs:
  lint:
    name: Lint & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint pyright yamllint ruff

      - name: Run Home Assistant addon linter
        uses: frenck/action-addon-linter@v2
        with:
          path: 'blink_clip_downloader'
          community: false

      - name: Run YAML lint
        run: yamllint .

      - name: Install project (editable)
        run: |
          pip install -e "blink_clip_downloader"

      - name: Run Ruff (modern Python lint)
        run: ruff check blink_clip_downloader

      - name: Run Pylint
        run: pylint blink_clip_downloader/blink_downloader

      - name: Run Pyright (type check)
        run: pyright

  test:
    name: Tests (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install project with test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "blink_clip_downloader[test]"

      - name: Run pytest with coverage
        run: |
          pytest blink_clip_downloader/tests -v --tb=short \
            --cov=blink_downloader --cov-report=term-missing \
            --cov-report=xml:coverage.xml

  build:
    name: Build Add-on (HA Builder)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build add-on image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: amd64
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: >-
            ghcr.io/${{ github.repository_owner }}/test-blink-clip-downloader
          image-tags: |
            ${{ github.sha }}
          push: "false"
          cosign: "false"
          version: ${{ github.sha }}
          context: blink_clip_downloader

  smoke-test:
    name: Smoke Test Add-on Container
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t test-addon blink_clip_downloader

      - name: Create smoke-test data directories
        run: |
          mkdir -p smoke-test/data smoke-test/share
          cat > smoke-test/data/options.json <<'EOF'
          {
            "username": "test@example.com",
            "password": "test-password",
            "download_path": "/share/blink-clips",
            "poll_interval": 300,
            "max_clips_per_poll": 1,
            "retention_days": 1,
            "max_storage_gb": 1.0,
            "camera_filter": [],
            "download_thumbnails": false,
            "concurrent_downloads": 1,
            "retry_attempts": 1,
            "retry_delay": 1.0,
            "notify_ha": false,
            "create_clip_manifest": false,
            "enable_library_db": true,
            "enable_media_server": false,
            "watch_ha_events": false,
            "fast_poll_duration": 120,
            "fast_poll_interval": 15,
            "post_motion_delay": 30,
            "event_cameras": [],
            "digest_enabled": false,
            "archive_enabled": false,
            "log_level": "info"
          }
          EOF

      - name: Run container
        run: |
          docker run -d --name addon \
            -e TZ=UTC \
            -v "${{ github.workspace }}/smoke-test/data:/data" \
            -v "${{ github.workspace }}/smoke-test/share:/share" \
            test-addon

      - name: Wait for startup
        run: sleep 15

      - name: Check container is running
        run: |
          if ! docker ps \
            --filter "name=addon" \
            --filter "status=running" \
            | grep addon; then
            docker logs addon
            exit 1
          fi

      - name: Cleanup smoke-test container
        if: always()
        run: docker rm -f addon || true
