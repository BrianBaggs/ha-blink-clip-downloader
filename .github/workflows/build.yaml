---
name: Build & Publish

'on':
  release:
    types: [published]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: >-
    ${{ github.repository_owner }}/ha-blink-clip-downloader/
    blink_clip_downloader

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    strategy:
      matrix:
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: version
        run: |
          VERSION=$(grep '^version:' blink_clip_downloader/config.yaml \
            | awk '{print $2}' \
            | tr -d '"')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.REGISTRY }}/${{ matrix.arch }}-${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ steps.version.outputs.version }}
            latest
          push: "true"
          cosign: "false"
          version: ${{ steps.version.outputs.version }}
          context: blink_clip_downloader
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/base-python:3.12

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write

    steps:
      - name: Publish multi-arch manifest
        uses: >-
          home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: '["amd64","aarch64"]'
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.build.outputs.version }}
            latest
          registry-prefix: ${{ env.REGISTRY }}
          cosign: "false"
