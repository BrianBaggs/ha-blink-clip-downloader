---
name: Build & Publish

"on":
  release:
    types:
      - published
  workflow_dispatch:

env:
  ARCHITECTURES: >
    ["amd64","aarch64"]
  IMAGE_NAME: >
    ghcr.io/${{ github.repository_owner }}/blink_clip_downloader

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write

    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: home-assistant/builder@2026.03.2
        with:
          args: >
            --${{ matrix.arch }}
            --target /data/blink_clip_downloader
            --image "${{ env.IMAGE_NAME }}"
            --docker-hub "ghcr.io"
            --addon
            --no-latest
            --version "${{ github.event.release.tag_name }}"
